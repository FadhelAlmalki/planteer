{% extends 'main/base.html' %}
{% load static %}

{% block title %}Contact - Planteer{% endblock %}

{% block content %}
<section class="py-2">
	<div class="row justify-content-center">
		<div class="col-12 col-xl-10">
			<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
				<div>
					<h1 class="h2 mb-1">Contact Us</h1>
					<p class="text-muted mb-0">Send us a message and we will get back to you soon.</p>
				</div>
			</div>

			<div class="row g-4 align-items-stretch">
				<div class="col-12 col-lg-7">
					<div class="card border-0 shadow-sm h-100">
						<div class="card-body p-4 p-md-5">
							<form method="post" action="{% url 'main:contact_view' %}" class="row g-3">
								{% csrf_token %}

								<div class="col-12 col-md-6">
									<label for="first_name" class="form-label">First Name</label>
									<input type="text" class="form-control" id="first_name" name="first_name" placeholder="Enter first name" required>
								</div>

								<div class="col-12 col-md-6">
									<label for="last_name" class="form-label">Last Name</label>
									<input type="text" class="form-control" id="last_name" name="last_name" placeholder="Enter last name" required>
								</div>

								<div class="col-12">
									<label for="email" class="form-label">Email</label>
									<input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
								</div>

								<div class="col-12">
									<label for="message" class="form-label">Message</label>
									<textarea class="form-control" id="message" name="message" rows="7" placeholder="Write your message..." required></textarea>
								</div>

								<div class="col-12 d-flex gap-2">
									<button type="submit" class="btn btn-dark">Send Message</button>
									<a href="{% url 'main:home_view' %}" class="btn btn-outline-secondary">Cancel</a>
								</div>
							</form>
						</div>
					</div>
				</div>

				<div class="col-12 col-lg-5">
					<div class="card border-0 shadow-sm h-100 overflow-hidden">
						<img src="{% static 'images/contact_image.jpg' %}" alt="Contact us" class="img-fluid h-100" style="min-height: 320px; object-fit: cover;">
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
{% endblock %}
