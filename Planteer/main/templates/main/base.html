{%load static%}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Planteer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
        <div class="container py-2">
            <a class="navbar-brand fw-semibold" href="{% url 'main:home_view' %}">Planteer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="mainNavbar">
                <ul class="navbar-nav align-items-lg-center gap-lg-2">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'plants:all_plant_view' %}">All Plants</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'main:contact_view' %}">Contact Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-dark btn-sm px-3 py-2" href="{% url 'plants:add_plant_view' %}">Add Plant</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4 flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-top mt-auto">
        <div class="container py-4 py-md-5">
            <div class="row g-4">

                <!-- Left side (Planteer)-->
                <div class="col-12 col-md-3">
                    <h6 class="fw-semibold mb-5">Planteer</h6>
                    <ul class="list-inline mb-0 text-secondary small">
                        <li class="list-inline-item"><a href="#" class="text-decoration-none text-dark bi bi-facebook"></a></li>
                        <li class="list-inline-item"><a href="#" class="text-decoration-none text-dark bi bi-linkedin"></a></li>
                        <li class="list-inline-item"><a href="#" class="text-decoration-none text-dark bi bi-youtube"></a></li>
                        <li class="list-inline-item"><a href="#" class="text-decoration-none text-dark bi bi-instagram"></a></li>
                    </ul>
                </div>

                <!-- Right side (Topics grouped)-->
                <div class="col-12 col-md-9 ms-md-auto">
                    <div class="row gx-2 gy-4 justify-content-md-end">
                        <div class="col-6 col-md-3">
                            <h6 class="text-uppercase text-secondary small mb-3">Topic</h6>
                            <ul class="list-unstyled small mb-0">
                                <li><a href="#" class="text-decoration-none text-dark">Page</a></li>
                                <li><a href="#" class="text-decoration-none text-dark">Page</a></li>
                                <li><a href="#" class="text-decoration-none text-dark">Page</a></li>
                            </ul>
                        </div>
                        <div class="col-6 col-md-3">
                            <h6 class="text-uppercase text-secondary small mb-3">Topic</h6>
                            <ul class="list-unstyled small mb-0">
                                <li><a href="#" class="text-decoration-none text-dark">Page</a></li>
                                <li><a href="#" class="text-decoration-none text-dark">Page</a></li>
                                <li><a href="#" class="text-decoration-none text-dark">Page</a></li>
                            </ul>
                        </div>
                        <div class="col-6 col-md-3">
                            <h6 class="text-uppercase text-secondary small mb-3">Topic</h6>
                            <ul class="list-unstyled small mb-0">
                                <li><a href="#" class="text-decoration-none text-dark">Page</a></li>
                                <li><a href="#" class="text-decoration-none text-dark">Page</a></li>
                                <li><a href="#" class="text-decoration-none text-dark">Page</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>

</html>
