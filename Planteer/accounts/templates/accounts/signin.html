{% extends 'main/base.html' %}
{% load static %}

{% block title %}Sign In - Planteer{% endblock %}

{% block content %}
<section class="row justify-content-center">
	<div class="col-12 col-md-8 col-lg-5">
		<div class="card shadow-sm border-0">
			<div class="card-body p-4 p-md-5">
				<h1 class="h3 mb-4 text-center">Sign In</h1>

				<form action="{% url 'accounts:sign_in' %}{% if 'next' in request.GET %}?next={{request.GET.next}}{% endif %}" method="post">
					{% csrf_token %}

					<div class="mb-3">
						<label for="username" class="form-label">Username</label>
						<input
							type="text"
							class="form-control"
							id="username"
							name="username"
							placeholder="Enter your username"
							required
						>
					</div>

					<div class="mb-3">
						<label for="password" class="form-label">Password</label>
						<input
							type="password"
							class="form-control"
							id="password"
							name="password"
							placeholder="Enter your password"
							required
						>
					</div>

					<div class="d-grid mt-4">
						<button type="submit" class="btn btn-success btn-lg">Sign In</button>
					</div>
				</form>

				<p class="text-center mt-4 mb-0">
					Don't have an account?
					<a href="{% url 'accounts:sign_up' %}" class="text-decoration-none fw-semibold">Sign Up</a>
				</p>
			</div>
		</div>
	</div>
</section>

{% endblock %}
