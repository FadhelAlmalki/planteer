    <!-- Filter Form -->
	<div class="card border-0 shadow-sm mb-4">
		<div class="card-body">
			<form method="get" action="{% url 'plants:all_plant_view' %}" class="row g-3 align-items-end">
				<div class="col-12 col-md-3">
					<label for="category" class="form-label">Category</label>
					<select id="category" name="category" class="form-select">
						<option value="" {% if not selected_category %}selected{% endif %}>All categories</option>
						{% for value, label in categories %}
						<option value="{{ value }}" {% if selected_category == value %}selected{% endif %}>{{ label }}</option>
						{% endfor %}
					</select>
				</div>

				<div class="col-12 col-md-3">
					<label for="country" class="form-label">Country</label>
					<select id="country" name="country" class="form-select">
						<option value="" {% if not selected_country %}selected{% endif %}>All countries</option>
						{% for country in countries %}
						<option value="{{ country.id }}" {% if selected_country == country.id|stringformat:"s" %}selected{% endif %}>{{ country.name }}</option>
						{% endfor %}
					</select>
				</div>

				<div class="col-12 col-md-3">
					<label for="is_edible" class="form-label">Edible</label>
					<select id="is_edible" name="is_edible" class="form-select">
						<option value="" {% if not selected_is_edible %}selected{% endif %}>All</option>
						<option value="true" {% if selected_is_edible == 'true' %}selected{% endif %}>Edible</option>
						<option value="false" {% if selected_is_edible == 'false' %}selected{% endif %}>Not edible</option>
					</select>
				</div>

				<div class="col-12 col-md-3 d-flex gap-2">
					<button type="submit" class="btn btn-dark">Filter</button>
					<a href="{% url 'plants:all_plant_view' %}" class="btn btn-outline-secondary">Reset</a>
				</div>
			</form>
		</div>
	</div> <!-- End of Filter Form -->
