{% extends 'main/base.html' %}

{% block title %}Update {{ plant.name }} - Planteer{% endblock %}

{% block content %}
<div class="row justify-content-center py-2">
	<div class="col-12 col-md-10 col-lg-8">
		<div class="card shadow-sm border-0">
			<div class="card-body p-4">
				<h1 class="h4 mb-4">Update Plant</h1>

				<form method="post" action="{% url 'plants:update_plant_view' plant.id %}" enctype="multipart/form-data">
					{% csrf_token %}

					<div class="mb-3">
						<label for="name" class="form-label">Plant Name</label>
						<input type="text" class="form-control" id="name" name="name" value="{{ plant.name }}" required>
					</div>

					<div class="mb-3">
						<label for="category" class="form-label">Plant Category</label>
						<select class="form-select" id="category" name="category" required>
							{% for value, label in categories %}
							<option value="{{ value }}" {% if plant.category == value %}selected{% endif %}>{{ label }}</option>
							{% endfor %}
						</select>
					</div>

					<div class="mb-3">
						<label class="form-label">Countries of Origin</label>
						<div class="d-flex align-items-center gap-2">
							{% for country in countries %}
							<input type="checkbox" class="form-check-input" name="countries" value="{{country.id}}" id="check-{{country.id}}" {% if country in plant.countries.all %}checked{% endif %} />
							<label for="check-{{country.id}}"> {{country.name}}</label>
							{% endfor %}
						</div>
					</div>

					<div class="mb-3">
						<label for="about" class="form-label">About Plant</label>
						<textarea class="form-control" id="about" name="about" rows="5" required>{{ plant.about }}</textarea>
					</div>

					<div class="mb-3">
						<label for="is_edible" class="form-label">Is Edible?</label>
						<select class="form-select" id="is_edible" name="is_edible" required>
							<option value="true" {% if plant.is_edible %}selected{% endif %}>Yes</option>
							<option value="false" {% if not plant.is_edible %}selected{% endif %}>No</option>
						</select>
					</div>

					<div class="mb-3">
						<label for="used_for" class="form-label">Used For</label>
						<textarea class="form-control" id="used_for" name="used_for" rows="5" required>{{ plant.used_for }}</textarea>
					</div>

					<div class="mb-3">
						<label class="form-label d-block">Current Image</label>
						{% if plant.image %}
						<img src="{{ plant.image.url }}" alt="{{ plant.name }}" class="img-fluid rounded border" style="max-height: 220px; object-fit: cover;">
						{% else %}
						<p class="text-muted mb-0">No image uploaded.</p>
						{% endif %}
					</div>

					<div class="mb-4">
						<label for="image" class="form-label">Replace Image (optional)</label>
						<input type="file" class="form-control" id="image" name="image">
					</div>

					<div class="d-flex flex-wrap gap-2">
						<button type="submit" class="btn btn-dark">Save Changes</button>
						<a href="{% url 'plants:plant_detail_view' plant.id %}" class="btn btn-outline-secondary">Cancel</a>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}
