{% extends 'main/base.html' %}
{% load static %}

{% block title %}Add Plant - Planteer{% endblock %}

{% block content %}
<div class="row justify-content-center">
	<div class="col-12 col-md-8 col-lg-7">
		<div class="card shadow-sm border-0">
			<div class="card-body p-4">
				<h1 class="h4 mb-4">Create a New Plant</h1>

				<form method="post" action="{% url 'plants:add_plant_view' %}" enctype="multipart/form-data">
					{% csrf_token %}

					<div class="mb-3">
						<label for="name" class="form-label">Plant Name</label>
						<input type="text" class="form-control" id="name" name="name" required>
					</div>

                    <div class="mb-3">
                        <label for="category" class="form-label">Plant Category</label>
                        <select class="form-control" id="category" name="category" required>
                            <option selected>Select a category</option>
                            <option value="flower">Flower</option>
                            <option value="tree">Tree</option>
                            <option value="herb">Herb</option>
                        </select>
                    </div>

					<div class="mb-3">
						<label class="form-label">Countries of Origin</label>
						<div class="d-flex align-items-center gap-2">
							{% for country in countries %}
								<input type="checkbox" class="form-check-input" name="countries" value="{{country.id}}" id="check-{{country.id}}"/>
								<label for="check-{{country.id}}"> {{country.name}}</label>
							{% endfor %}
						</div>
					</div>

					<div class="mb-3">
						<label for="about" class="form-label">About Plant</label>
						<textarea class="form-control" id="about" name="about" rows="6" required></textarea>
					</div>

                    <div class="mb-3">
						<label for="is_edible" class="form-label">Is Edible?</label>
						<select class="form-control" id="is_edible" name="is_edible" required>
							<option selected>Select an option</option>
							<option value="true">Yes</option>
							<option value="false">No</option>
						</select>
					</div>

                    <div class="mb-3">
						<label for="used_for" class="form-label">Used For</label>
						<textarea class="form-control" id="used_for" name="used_for" rows="6" required></textarea>
					</div>

					<div class="mb-3">
						<label for="image" class="form-label">Poster Image</label>
						<input type="file" class="form-control" id="image" name="image" required>
					</div>

					<div class="d-flex gap-2">
						<button type="submit" class="btn btn-success">Add Plant</button>
						<a href="{% url 'main:home_view' %}" class="btn btn-outline-secondary">Cancel</a>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}
